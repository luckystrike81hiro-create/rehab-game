<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ふきふきゲーム - 3Dモード</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      font-family: Arial, sans-serif;
    }
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 16px;
      z-index: 10;
      pointer-events: none;
    }
    #progressBar {
      position: fixed;
      bottom: 0; left: 0;
      height: 8px;
      background: linear-gradient(90deg, #00ff88, #00cfff);
      transition: width 0.1s;
      z-index: 10;
    }
    /* 十字キー */
    #dpad {
      position: fixed;
      bottom: 30px;
      right: 24px;
      width: 120px;
      height: 120px;
      z-index: 20;
    }
    .dpad-btn {
      position: absolute;
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active { background: rgba(255,255,255,0.4); }
    #dpad-up    { top: 0;   left: 42px; }
    #dpad-down  { bottom: 0; left: 42px; }
    #dpad-left  { top: 42px; left: 0; }
    #dpad-right { top: 42px; right: 0; }
    /* 戻るボタン */
    #backBtn {
      position: fixed;
      top: 60px; left: 16px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 14px;
      z-index: 20;
      cursor: pointer;
    }
    #message {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(0,255,136,0.8);
      pointer-events: none;
      z-index: 20;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="cleanPercent">清潔度: 0%</div>
    <div id="modeLabel">3Dモード</div>
    <div id="timer">00:00</div>
  </div>
  <div id="progressBar" style="width:0%"></div>
  <div id="message"></div>

  <!-- 十字キー -->
  <div id="dpad">
    <div class="dpad-btn" id="dpad-up">▲</div>
    <div class="dpad-btn" id="dpad-down">▼</div>
    <div class="dpad-btn" id="dpad-left">◀</div>
    <div class="dpad-btn" id="dpad-right">▶</div>
  </div>

  <a id="backBtn" href="index.html">← もどる</a>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="game-3d.js"></script>
</body>
</html>
