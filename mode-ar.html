<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>モンスター探索</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      font-family: Arial, sans-serif;
    }
    #video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    #gameCanvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 1;
    }
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: rgba(0,0,0,0.4);
      color: #fff;
      font-size: 15px;
      z-index: 10;
      pointer-events: none;
    }
    /* 許可画面 */
    #permScreen {
      position: fixed;
      inset: 0;
      background: rgba(13,13,26,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 32px;
      text-align: center;
    }
    #permScreen h2 { color: #fff; font-size: 24px; margin-bottom: 12px; }
    #permScreen p  { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.7; margin-bottom: 32px; }
    #startBtn {
      background: linear-gradient(135deg, #39FF14, #00CFFF);
      color: #000;
      border: none;
      border-radius: 30px;
      padding: 18px 48px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }
    /* レーダー */
    #radar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
    }
    #backBtn {
      position: fixed;
      top: 60px; left: 16px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 14px;
      z-index: 20;
      text-decoration: none;
    }
    #compass {
      position: fixed;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="gameCanvas"></canvas>

  <div id="ui">
    <div id="monsterCount">残り: - 体</div>
    <div>📷 モンスター探索</div>
    <div id="heading">--°</div>
  </div>
  <div id="compass"></div>
  <div id="gyroDebug" style="
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.8); color:#00ff00;
    font-size:28px; font-weight:bold; font-family:monospace;
    padding:20px 32px; border-radius:16px; z-index:50;
    pointer-events:none; text-align:center; display:none;
  ">heading: --°</div>

  <canvas id="radar" width="120" height="120"></canvas>
  <a id="backBtn" href="index.html">← もどる</a>
  <button id="invertBtn" style="
    position:fixed; top:60px; right:16px;
    background:rgba(255,100,0,0.7); color:#fff;
    border:1px solid rgba(255,255,255,0.4);
    border-radius:16px; padding:8px 14px;
    font-size:13px; z-index:20; cursor:pointer;
  ">↕ 反転中</button>

  <!-- 許可要求画面 -->
  <div id="permScreen">
    <h2>📷 モンスター探索</h2>
    <p>タップしてカメラを起動</p>
    <button id="startBtn">▶ スタート</button>
  </div>

  <script src="game-ar.js"></script>
</body>
</html>
