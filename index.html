<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ふきふきゲーム</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }
    #gameCanvas {
      display: block;
      cursor: none;
    }
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-family: 'Arial', sans-serif;
      font-size: 18px;
      pointer-events: none;
      z-index: 10;
    }
    #progressBar {
      position: fixed;
      bottom: 0; left: 0;
      height: 8px;
      background: linear-gradient(90deg, #00ff88, #00cfff);
      transition: width 0.1s;
      z-index: 10;
    }
    #message {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: 'Arial', sans-serif;
      font-size: 36px;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(0,255,136,0.8);
      pointer-events: none;
      z-index: 20;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #fingerCount {
      position: fixed;
      bottom: 20px; right: 20px;
      color: rgba(255,255,255,0.5);
      font-family: 'Arial', sans-serif;
      font-size: 14px;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div id="cleanPercent">清潔度: 0%</div>
    <div id="fingerInfo">指: 0本</div>
    <div id="timer">00:00</div>
  </div>
  <div id="progressBar" style="width:0%"></div>
  <div id="message" id="message"></div>
  <div id="fingerCount"></div>

  <script src="game.js"></script>
</body>
</html>
